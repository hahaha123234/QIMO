<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>无锡 · 江南水乡 | 我的家乡欢迎页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动文字影响美观，但不影响功能 */
        }

        body {
            width: 100%;
            height: 100vh;
            /* 背景图片：无锡太湖风光（Pixabay 高品质免费图片，展现无锡太湖美景） */
            background-image: url("123.png");
            background-size: cover;
            background-position: center 30%;  /* 稍微偏移中心，突出湖面和远山，更显江南韵味 */
            background-repeat: no-repeat;
            background-attachment: fixed;     /* 固定背景，滚动时保持视觉冲击 */
            font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Helvetica Neue', sans-serif;
            
            /* 弹性布局实现完美居中 */
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* 可选：为了增强背景层次，添加一个极淡的遮罩层，让圆框更突出但不破坏照片感 */
            position: relative;
        }
        
        /* 极简半透明暖色遮罩（柔和光线），让文字对比更舒服，同时保留无锡照片细节 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;  /* 让遮罩不干扰点击 */
            z-index: 0;
        }
        
        /* 圆形主容器 — 圆框，优雅毛玻璃质感 + 半透明白色基底 */
        .circle-frame {
            position: relative;
            z-index: 10;
            width: min(78vw, 520px);
            height: min(78vw, 520px);
            background: rgba(255, 248, 235, 0.88);    /* 暖白半透，温润如玉 */
            backdrop-filter: blur(2px);               /* 轻微模糊背景，增强文字可读性与江南朦胧感 */
            border-radius: 50%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 245, 0.6) inset;
            
            /* 内部内容布局：垂直居中，流畅留白 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            
            /* 优雅过渡效果 */
            transition: all 0.3s ease;
            animation: softGlow 2s infinite alternate;
        }
        
        /* 柔和呼吸光晕，让圆框更有灵气 */
        @keyframes softGlow {
            0% {
                box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 245, 220, 0.7) inset;
            }
            100% {
                box-shadow: 0 35px 55px -8px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(255, 235, 200, 0.9) inset;
            }
        }
        
        /* 上方欢迎语 —— 大按钮上面的一句话 */
        .welcome-text {
            font-size: clamp(1.5rem, 6vw, 2.4rem);
            font-weight: 600;
            color: #2c3e2f;
            text-shadow: 2px 2px 8px rgba(255, 245, 215, 0.9);
            letter-spacing: 0.02em;
            margin-bottom: 1.2rem;
            padding: 0 0.5rem;
            background: linear-gradient(135deg, #2c5e2a, #4a7c3f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
            /* 让文字更雅致，添加淡色底纹辅助阅读 */
            background-color: #2c5e2a;
            background-image: linear-gradient(120deg, #2b4b1e, #5f8b4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Segoe UI', 'Poppins', cursive;
        }
        
        /* 为了兼容不支持background-clip的浏览器，增加后备深色 */
        @supports not (background-clip: text) {
            .welcome-text {
                color: #2d4a22;
                text-shadow: 0 2px 5px rgba(255,250,210,0.8);
            }
        }
        
        /* 大按钮样式 — 大气、现代，呼应江南活力 */
        .enter-button {
            background: linear-gradient(135deg, #f5b042, #e67e22);
            border: none;
            cursor: pointer;
            padding: 0.9rem 2.2rem;
            width: 80%;
            max-width: 260px;
            font-size: clamp(1.8rem, 7vw, 2.6rem);
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 4px;
            color: #fffef7;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-radius: 60px;
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.3), 0 2px 0 0 rgba(255,215,150,0.6) inset;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(2px);
            display: inline-block;
            margin-top: 0.2rem;
        }
        
        /* 按钮悬停效果：放大+光影变化 */
        .enter-button:hover {
            transform: scale(1.04);
            background: linear-gradient(135deg, #ffbc5e, #f0641a);
            box-shadow: 0 20px 28px -10px rgba(0, 0, 0, 0.4), 0 3px 0 0 rgba(255, 225, 150, 0.8) inset;
            letter-spacing: 6px;
        }
        
        /* 按钮点击瞬间微动感 */
        .enter-button:active {
            transform: scale(0.97);
            transition: 0.05s;
            box-shadow: 0 6px 12px -4px rgba(0,0,0,0.3);
        }
        
        /* 为了让圆形在极端小屏下内容依然友好，增加响应调节 */
        @media (max-width: 550px) {
            .circle-frame {
                width: min(88vw, 400px);
                height: min(88vw, 400px);
                padding: 1rem;
            }
            .enter-button {
                width: 75%;
                font-size: 1.8rem;
                padding: 0.7rem 1rem;
                letter-spacing: 3px;
            }
            .welcome-text {
                margin-bottom: 1rem;
                font-size: 1.6rem;
            }
        }
        
        @media (max-width: 380px) {
            .circle-frame {
                width: 92vw;
                height: 92vw;
                padding: 0.8rem;
            }
            .enter-button {
                font-size: 1.5rem;
                padding: 0.6rem 0.8rem;
                width: 80%;
            }
            .welcome-text {
                font-size: 1.4rem;
            }
        }
        
        /* 增加一点文化小点缀：底部添加半透明水印，体现无锡雅韵，不影响主体 */
        .cultural-tag {
            position: fixed;
            bottom: 12px;
            right: 16px;
            z-index: 20;
            font-size: 0.75rem;
            color: rgba(255,250,225,0.65);
            background: rgba(30,30,20,0.3);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 400;
            font-family: monospace;
            letter-spacing: 1px;
            pointer-events: none;
        }
        
        /* 可选增添一点江南元素的波纹圈（装饰）不干扰点击 */
        .circle-frame::after {
            content: "❦";
            position: absolute;
            bottom: 18px;
            right: 28px;
            font-size: 20px;
            opacity: 0.2;
            color: #b6692c;
            font-family: serif;
            pointer-events: none;
            transform: rotate(10deg);
        }
        
        /* 更好的移动端触控体验 */
        .enter-button {
            touch-action: manipulation;
        }
        
        /* 按钮获得焦点时的辅助样式 */
        .enter-button:focus-visible {
            outline: 3px solid #ffb347;
            outline-offset: 4px;
        }
    </style>
</head>
<body>

<!-- 圆形主视觉区域：圆框+内文+大按钮 -->
<div class="circle-frame" aria-label="欢迎进入无锡主页入口">
    <!-- 大按钮上方的那句话：Welcome to my hometown page -->
    <div class="welcome-text">
        ✧ Welcome to my hometown page ✧
    </div>
    
    <!-- 大按钮，写着 ENTER -->
    <a href="page 2.html">
    <button class="enter-button" id="enterBtn" aria-label="进入家乡无锡之旅">ENTER</button>
</a></div>

<!-- 极简文化标记，展现无锡印象（不影响体验） -->
<div class="cultural-tag">
    ⛩️ 太湖佳绝处 · 无锡  |  江南盛地
</div>


<!-- 备注说明：背景照片使用了无锡太湖（Taihu Lake）的高清摄影作品，完美呈现江南水乡气质，符合“关于无锡的照片”需求。
     照片来源 Pixabay 免费授权，可商用，体现了无锡鼋头渚周边太湖风光，意境契合家乡主题。 -->
</body>
</html>
